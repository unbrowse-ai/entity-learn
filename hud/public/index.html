<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>entity-learn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{}}}</script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    .prose pre { background: rgb(244 244 245); padding: 0.75rem; border-radius: 0.5rem; overflow-x: auto; font-size: 12px; }
    .prose code { background: rgb(244 244 245); padding: 0.1rem 0.3rem; border-radius: 0.25rem; font-size: 12px; }
    .prose ul, .prose ol { padding-left: 1.5rem; }
    .prose a { color: rgb(59 130 246); text-decoration: underline; }
    @media(prefers-color-scheme:dark) {
      .prose pre, .prose code { background: rgb(39 39 42 / 50%); }
    }
  </style>
</head>
<body class="min-h-full bg-[#fafafa] dark:bg-[#0a0a0a] text-zinc-900 dark:text-zinc-100">
  <div id="app" class="max-w-xl mx-auto px-5 py-6">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-2.5">
        <span id="dot" class="w-2 h-2 rounded-full bg-zinc-300"></span>
        <span class="text-[13px] font-medium text-zinc-400 tracking-wide">entity-learn</span>
      </div>
      <span id="status" class="text-[11px] text-zinc-400"></span>
    </div>
    <div id="root">
      <div class="flex flex-col items-center justify-center py-32 text-zinc-300 dark:text-zinc-600">
        <div class="w-8 h-8 rounded-lg border-2 border-zinc-200 dark:border-zinc-800 mb-4 animate-pulse"></div>
        <p class="text-[13px]">Loading live memory...</p>
      </div>
    </div>
  </div>
  <script src="/canvas.js"></script>
</body>
</html>
